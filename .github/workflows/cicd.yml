name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t devops-k8s-project .

    - name: Run Docker Container
      run: |
        docker run -d -p 5000:5000 devops-k8s-project